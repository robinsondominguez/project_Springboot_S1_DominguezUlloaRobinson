<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiTrack - Sistema de Inventario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container py-5">
    <header class="row mb-4 align-items-center">
        <div class="col-md-8">
            <h1 class="logo-text">📦 LogiTrack</h1>
            <p class="subtitle">Gestión Logística y Control de Almacén</p>
        </div>
        <div class="col-md-4 text-end">
            <div id="auth-status" class="status-indicator">Estado: <span>Desconectado</span></div>
        </div>
    </header>

    <div class="row">
        <aside class="col-lg-4">
            <div class="glass-card p-4 mb-4">
                <h4 class="section-title">🔐 Acceso</h4>
                <div class="mb-3">
                    <input type="text" id="user" class="form-control custom-input" placeholder="Usuario">
                </div>
                <div class="mb-3">
                    <input type="password" id="pass" class="form-control custom-input" placeholder="Contraseña">
                </div>
                <button class="btn btn-primary-custom w-100" onclick="app.login()">Entrar al Sistema</button>
            </div>

            <div class="glass-card p-4">
                <h4 class="section-title">📝 Gestión de Ítems</h4>
                <div class="row g-2">
                    <div class="col-12 mb-2">
                        <label class="form-label">ID Producto</label>
                        <input type="number" id="prod-id" class="form-control custom-input" placeholder="Auto-generado">
                    </div>
                    <div class="col-12 mb-2">
                        <label class="form-label">Nombre del Producto</label>
                        <input type="text" id="prod-nombre" class="form-control custom-input" placeholder="Nombre">
                    </div>
                    <div class="col-12 mb-2">
                        <label class="form-label">Categoría</label>
                        <input type="text" id="prod-categoria" class="form-control custom-input" placeholder="Categoría">
                    </div>
                    <div class="col-6 mb-3">
                        <label class="form-label">Stock</label>
                        <input type="number" id="prod-stock" class="form-control custom-input" placeholder="0">
                    </div>
                    <div class="col-6 mb-3">
                        <label class="form-label">Precio ($)</label>
                        <input type="number" step="0.01" id="prod-precio" class="form-control custom-input" placeholder="0.00">
                    </div>
                </div>
                <div class="d-flex gap-2">
                    <button class="btn btn-success-custom flex-grow-1" onclick="app.request('POST', '/api/productos')">Insertar</button>
                    <button class="btn btn-warning-custom flex-grow-1" onclick="app.request('PUT', '/api/productos')">Actualizar</button>
                </div>
            </div>
        </aside>

        <main class="col-lg-8">
            <div class="glass-card p-4 mb-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="section-title m-0">📊 Inventario Real-Time</h4>
                    <button class="btn btn-refresh" onclick="app.request('GET', '/api/productos')">🔄 Sincronizar</button>
                </div>
                <div class="table-responsive">
                    <table class="table table-custom">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Producto</th>
                                <th>Categoría</th>
                                <th>Stock</th>
                                <th>Precio</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-productos">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="glass-card p-4">
                <h5 class="section-title small">Console Output (JSON)</h5>
                <pre id="json-output">Esperando conexión con el backend...</pre>
            </div>
        </main>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
